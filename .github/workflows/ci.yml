name: Run Tests on Ci
on:
  push:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Install Dependencies
        uses: cypress-io/github-action@v7.1.9
        with:
          runTests: false
      - name: Run Tests
        uses: cypress-io/github-action@v7.1.9
        with:
          install: false
